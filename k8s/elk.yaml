apiVersion: apps/v1
kind: Deployment
metadata:
  name: elk-deployment
  labels:
    app: careershield-elk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: careershield-elk
  template:
    metadata:
      labels:
        app: careershield-elk
    spec:
      containers:
      - name: elasticsearch
        image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
        ports:
        - containerPort: 9200
        env:
        - name: discovery.type
          value: single-node
        - name: xpack.security.enabled
          value: "false"
        - name: ES_JAVA_OPTS
          value: "-Xms512m -Xmx512m"
        resources:
          limits:
            memory: "1Gi"
          requests:
            memory: "512Mi"

      - name: logstash
        image: docker.elastic.co/logstash/logstash:8.11.3
        ports:
        - containerPort: 12201
          protocol: UDP
        volumeMounts:
        - name: config-volume
          mountPath: /usr/share/logstash/pipeline/
        resources:
          limits:
            memory: "512Mi"
          requests:
            memory: "256Mi"

      - name: kibana
        image: docker.elastic.co/kibana/kibana:8.11.3
        ports:
        - containerPort: 5601
        env:
        - name: ELASTICSEARCH_HOSTS
          value: "http://localhost:9200"
        resources:
          limits:
            memory: "512Mi"
          requests:
            memory: "256Mi"
      volumes:
      - name: config-volume
        configMap:
          name: logstash-config

---
apiVersion: v1
kind: Service
metadata:
  name: elk-service
spec:
  type: NodePort
  selector:
    app: careershield-elk
  ports:
    - name: elasticsearch
      protocol: TCP
      port: 9200
      targetPort: 9200
    - name: kibana
      protocol: TCP
      port: 5601
      targetPort: 5601
      nodePort: 30561
    - name: logstash
      protocol: UDP
      port: 12201
      targetPort: 12201
