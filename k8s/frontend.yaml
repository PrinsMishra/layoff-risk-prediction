apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels:
    app: careershield-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: careershield-frontend
  template:
    metadata:
      labels:
        app: careershield-frontend
    spec:
      containers:
      - name: frontend
        image: careershield-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: NodePort
  selector:
    app: careershield-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
