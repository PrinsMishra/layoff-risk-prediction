---
- name: Ensure Kubernetes manifests are applied
  command: kubectl apply -f {{ k8s_dir }}/{{ item }}
  loop:
    - vault.yaml
    - elk.yaml
    - backend.yaml
    - frontend.yaml
    - hpa.yaml
  register: apply_result
  changed_when: "'created' in apply_result.stdout or 'configured' in apply_result.stdout"

- name: Rollout new Backend Image
  command: kubectl set image deployment/backend-deployment backend={{ backend_image }}
  register: backend_rollout
  changed_when: "'image updated' in backend_rollout.stdout"

- name: Rollout new Frontend Image
  command: kubectl set image deployment/frontend-deployment frontend={{ frontend_image }}
  register: frontend_rollout
  changed_when: "'image updated' in frontend_rollout.stdout"

- name: Verify Backend Rollout Status
  command: kubectl rollout status deployment/backend-deployment --timeout=60s

- name: Verify Frontend Rollout Status
  command: kubectl rollout status deployment/frontend-deployment --timeout=60s
