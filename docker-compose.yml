services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: careershield-backend:latest
    container_name: careershield-api
    ports:
      - "8000:8000"
    logging:
      driver: "gelf"
      options:
        gelf-address: "udp://127.0.0.1:12201"
    # Mount models so they can be securely hot-swapped without rebuilding
    volumes:
      - ./models:/app/models
    environment:
      - MODELS_DIR=/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: careershield-frontend:latest
    container_name: careershield-ui
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    container_name: careershield-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    restart: unless-stopped

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.3
    container_name: careershield-logstash
    volumes:
      - ./elk/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    ports:
      - "12201:12201/udp"
    depends_on:
      - elasticsearch
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.3
    container_name: careershield-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    restart: unless-stopped
